apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: {{ .Values.namespace.name }}
spec:
  type: {{ .Values.api.service.type }}
  loadBalancerIP: {{ .Values.api.service.loadBalancerIP | quote }}
  selector:
    app: api
  ports:
  - port: {{ .Values.api.service.port }}
    targetPort: {{ .Values.api.service.targetPort }}