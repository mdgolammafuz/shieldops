apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: {{ .Values.namespace.name }}
data:
  nats.conf: |
    # NATS Server Configuration
    port: 4222
    http_port: 8222

    # Logging
    debug: false
    trace: false

    # Limits
    max_payload: 1MB
    max_pending: 64MB
    max_connections: 100

    # No JetStream (memory only for RAM efficiency)
    # In production, enable JetStream for persistence