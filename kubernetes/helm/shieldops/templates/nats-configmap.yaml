apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: {{ .Values.namespace.name }}
data:
  nats.conf: |
    # NATS Server Configuration
    port: 4222
    http_port: 8222

    # Logging
    debug: false
    trace: false

    # Limits
    max_payload: 1MB
    max_pending: 64MB
    max_connections: 100

    # JetStream enabled for buffer lag metrics
    jetstream {
      store_dir: /data/jetstream
      max_mem: 1G
    }