apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: {{ .Values.namespace.name }}
  labels:
    app: nats
spec:
  replicas: {{ .Values.nats.replicaCount }}
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: nats
        image: "{{ .Values.nats.image.repository }}:{{ .Values.nats.image.tag }}"
        args:
        - "-c"
        - "/etc/nats/nats.conf"
        ports:
        - name: client
          containerPort: 4222
        - name: monitor
          containerPort: 8222
        volumeMounts:
        - name: config
          mountPath: /etc/nats
          readOnly: true
        - name: data
          mountPath: /data/jetstream
        resources:
          requests:
            memory: {{ .Values.nats.resources.requests.memory | quote }}
            cpu: {{ .Values.nats.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.nats.resources.limits.memory | quote }}
            cpu: {{ .Values.nats.resources.limits.cpu | quote }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8222
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8222
          initialDelaySeconds: 5
          periodSeconds: 5
      - name: nats-exporter
        image: "natsio/prometheus-nats-exporter:latest"
        args:
        - "-varz"
        - "-jsz=all"
        - "http://localhost:8222"
        - "-port"
        - "7777"
        ports:
        - name: metrics
          containerPort: 7777
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
      volumes:
      - name: config
        configMap:
          name: nats-config
      - name: data
        emptyDir: {}