apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingestor-egress
  namespace: {{ .Values.namespace.name }}
spec:
  podSelector:
    matchLabels:
      app: ingestor
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 443
  - to:
    - podSelector:
        matchLabels:
          app: nats
    ports:
    - protocol: TCP
      port: 4222