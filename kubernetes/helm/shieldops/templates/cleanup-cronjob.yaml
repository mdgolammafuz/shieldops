apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup
  namespace: {{ .Values.namespace.name }}
  labels:
    app: cleanup
spec:
  schedule: {{ .Values.cleanup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: cleanup
            image: "{{ .Values.cleanup.image.repository }}:{{ .Values.cleanup.image.tag }}"
            command:
            - /bin/sh
            - -c
            - |
              echo "Starting GDPR cleanup..."
              DELETED=$(psql -h postgres -U shieldops -d shieldops -tAc \
                "DELETE FROM threats WHERE created_at < NOW() - INTERVAL '7 days' RETURNING id" | wc -l)
              echo "Deleted $DELETED records older than 7 days"
              echo "Cleanup complete"
            env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            resources:
              requests:
                memory: {{ .Values.cleanup.resources.requests.memory | quote }}
                cpu: {{ .Values.cleanup.resources.requests.cpu | quote }}
              limits:
                memory: {{ .Values.cleanup.resources.limits.memory | quote }}
                cpu: {{ .Values.cleanup.resources.limits.cpu | quote }}
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
          restartPolicy: OnFailure