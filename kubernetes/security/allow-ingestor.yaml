apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingestor-egress
  namespace: shieldops
spec:
  podSelector:
    matchLabels:
      app: ingestor
  policyTypes:
  - Egress
  egress:
  # 1. Allow internal DNS resolution to find the public IP of certstream.calidog.io
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # 2. Allow outbound connection to the public internet (WSS / Port 443)
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 443
  # 3. Allow internal connection to push validated certs to NATS
  - to:
    - podSelector:
        matchLabels:
          app: nats
    ports:
    - protocol: TCP
      port: 4222
