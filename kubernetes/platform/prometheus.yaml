# Prometheus - Metrics Collection
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: shieldops
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    # Alert rules
    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # ShieldOps applications
      - job_name: 'ingestor'
        static_configs:
          - targets: ['ingestor:8080']

      - job_name: 'processor'
        static_configs:
          - targets: ['processor:8080']

      # NATS monitoring
      - job_name: 'nats'
        static_configs:
          - targets: ['nats:8222']

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: shieldops
data:
  alerts.yml: |
    groups:
    - name: shieldops-alerts
      rules:
      # Ingestor down
      - alert: IngestorDown
        expr: up{job="ingestor"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Ingestor is down"
          description: "Ingestor has been down for more than 1 minute"

      # Processor down
      - alert: ProcessorDown
        expr: up{job="processor"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Processor is down"
          description: "Processor has been down for more than 1 minute"

      # High buffer lag (NATS backpressure)
      - alert: HighBufferLag
        expr: nats_consumer_num_pending > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NATS buffer backlog high"
          description: "NATS has {{ $value }} pending messages"

      # No messages received (data freshness)
      - alert: NoMessagesReceived
        expr: rate(ingestor_messages_received_total[5m]) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No messages received"
          description: "Ingestor hasn't received messages for 5 minutes"

      # No threats detected (might indicate detector issue)
      - alert: NoThreatsDetected
        expr: rate(processor_threats_total[30m]) == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "No threats detected"
          description: "No threats detected in 30 minutes (might be normal)"

      # High error rate
      - alert: HighInvalidMessageRate
        expr: rate(ingestor_messages_invalid_total[5m]) / rate(ingestor_messages_received_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High invalid message rate"
          description: "More than 10% of messages are invalid"

      # Pod restarts
      - alert: PodRestartingFrequently
        expr: increase(kube_pod_container_status_restarts_total{namespace="shieldops"}[1h]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod restarting frequently"
          description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in the last hour"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: shieldops
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534  # nobody
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: prometheus
        image: prom/prometheus:v2.48.0
        args:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.tsdb.path=/prometheus'
        - '--storage.tsdb.retention.time=7d'
        - '--web.enable-lifecycle'
        ports:
        - name: web
          containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
        - name: rules
          mountPath: /etc/prometheus/rules
        - name: data
          mountPath: /prometheus
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: rules
        configMap:
          name: prometheus-rules
      - name: data
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: shieldops
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
  - name: web
    port: 9090
    targetPort: 9090
  type: NodePort
