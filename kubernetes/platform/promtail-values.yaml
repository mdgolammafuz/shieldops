# Values for grafana/promtail

daemonset:
  enabled: true

# Preserving your exact security requirements for host log reading
podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - DAC_READ_SEARCH

resources:
  requests:
    memory: "64Mi"
    cpu: "25m"
  limits:
    memory: "128Mi"
    cpu: "100m"

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

config:
  clients:
    - url: http://loki:3100/loki/api/v1/push
      tenant_id: shieldops
  
  # Injecting your exact custom JSON parsing pipeline
  snippets:
    extraScrapeConfigs: |
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - shieldops
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: shieldops
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
        pipeline_stages:
          - json:
              expressions:
                level: level
                msg: msg
                event: event
                service: service
                domain: domain
                keyword: keyword
                confidence: confidence
                fingerprint: fingerprint
                error: error
          - labels:
              level:
              service:
              confidence: