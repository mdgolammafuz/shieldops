# Values for prometheus-community/prometheus
server:
  podLabels:
    app: prometheus
  service:
    port: 80
    targetPort: 9090
    labels:
      app: prometheus
  retention: 7d
  persistentVolume:
    enabled: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

# Disable the insecure sidecar
configmapReload:
  prometheus:
    enabled: false

serverFiles:
  prometheus.yml:
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/config/alerts.yml
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'ingestor'
        static_configs:
          - targets: ['ingestor:8080']
      - job_name: 'processor'
        static_configs:
          - targets: ['processor:8080']
      - job_name: 'nats'
        static_configs:
          - targets: ['nats:8222']
  alerts.yml:
    groups:
    - name: shieldops-alerts
      rules:
      - alert: IngestorDown
        expr: up{job="ingestor"} == 0
        for: 1m
        labels:
          severity: critical
      - alert: ProcessorDown
        expr: up{job="processor"} == 0
        for: 1m
        labels:
          severity: critical

# Disable default components we don't need
alertmanager:
  enabled: false
kube-state-metrics:
  enabled: false
prometheus-node-exporter:
  enabled: false
pushgateway:
  enabled: false
prometheus-pushgateway:
  enabled: false