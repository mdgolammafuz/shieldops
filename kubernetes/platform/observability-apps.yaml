apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://prometheus-community.github.io/helm-charts'
      chart: prometheus
      targetRevision: 25.11.0
      helm:
        valueFiles:
        - $values/kubernetes/platform/prometheus-values.yaml
    - repoURL: 'https://github.com/mdgolammafuz/shieldops.git'
      targetRevision: HEAD
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: shieldops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://grafana.github.io/helm-charts'
      chart: grafana
      targetRevision: 7.0.0
      helm:
        valueFiles:
        - $values/kubernetes/platform/grafana-values.yaml
    - repoURL: 'https://github.com/mdgolammafuz/shieldops.git'
      targetRevision: HEAD
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: shieldops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true