# Promtail - Log Collection Agent
# Runs on each node, collects container logs, sends to Loki
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: shieldops
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: warn

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push
        tenant_id: shieldops

    scrape_configs:
      # Collect logs from shieldops namespace only
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - shieldops

        relabel_configs:
          # Only keep shieldops namespace
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: shieldops

          # Use pod name as instance
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

          # Use container name
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container

          # Use app label
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app

          # Node name
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node

        pipeline_stages:
          # Parse JSON logs from ingestor and processor
          - json:
              expressions:
                level: level
                msg: msg
                event: event
                service: service
                domain: domain
                keyword: keyword
                confidence: confidence
                fingerprint: fingerprint
                error: error

          # Add parsed fields as labels (selective)
          - labels:
              level:
              service:
              confidence:

          # Drop debug logs in production (optional)
          # - match:
          #     selector: '{level="debug"}'
          #     action: drop

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: shieldops
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      securityContext:
        runAsUser: 0  # Required to read container logs
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: promtail
        image: grafana/promtail:2.9.3
        args:
        - -config.file=/etc/promtail/promtail.yaml
        ports:
        - name: http
          containerPort: 9080
        volumeMounts:
        - name: config
          mountPath: /etc/promtail
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: containers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: pods
          mountPath: /var/log/pods
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
            add: ["DAC_READ_SEARCH"]  # Read container logs
        readinessProbe:
          httpGet:
            path: /ready
            port: 9080
          initialDelaySeconds: 10
          periodSeconds: 10
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      volumes:
      - name: config
        configMap:
          name: promtail-config
      - name: varlog
        hostPath:
          path: /var/log
      - name: containers
        hostPath:
          path: /var/lib/docker/containers
      - name: pods
        hostPath:
          path: /var/log/pods

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: shieldops

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
- apiGroups: [""]
  resources: ["nodes", "services", "endpoints", "pods"]
  verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
- kind: ServiceAccount
  name: promtail
  namespace: shieldops
