apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: shieldops
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: processor
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api
        image: europe-west3-docker.pkg.dev/shieldops-2026-xyz/shieldops-repo/shieldops-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: db-secret
          mountPath: /etc/secrets
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          periodSeconds: 5
      volumes:
      - name: db-secret
        secret:
          secretName: postgres-secret
          defaultMode: 0400
          items:
          - key: database-url
            path: database-url
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: shieldops
spec:
  type: LoadBalancer
  loadBalancerIP: 35.242.213.243
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 8000
