# PodDisruptionBudgets
# Ensures minimum availability during voluntary disruptions (node drain, updates)
#
# ==============================================================================
# PRODUCTION FIX / ARCHITECTURE NOTE:
# For single-replica deployments, minAvailable: 1 creates an eviction deadlock
# during node drains because there is no second pod to take the load.
#
# Local Environment: Applied as-is (minAvailable: 1) to pass verification.
# Cloud/Production: You MUST either accept brief downtime (minAvailable: 0)
# OR scale the Deployments to `replicas: 2` before deploying to a multi-node cluster.
# ==============================================================================

---
# Processor PDB - Critical for data processing
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: processor-pdb
  namespace: shieldops
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: processor

---
# Ingestor PDB - Critical for data ingestion
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ingestor-pdb
  namespace: shieldops
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ingestor
