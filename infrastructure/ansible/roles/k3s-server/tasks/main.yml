# K3s Server Role - Control Plane Installation
---
- name: Check if K3s is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Download K3s installer
  get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: '0755'
  when: not k3s_binary.stat.exists

- name: Create K3s config directory
  file:
    path: /etc/rancher/k3s
    state: directory
    mode: '0755'

- name: Deploy K3s server config
  template:
    src: k3s-server-config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: '0644'
  notify: Restart k3s

- name: Install K3s server
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
  command: /tmp/k3s-install.sh
  args:
    creates: /usr/local/bin/k3s
  notify: Restart k3s

- name: Wait for K3s to be ready
  command: k3s kubectl get nodes
  register: k3s_ready
  until: k3s_ready.rc == 0
  retries: 30
  delay: 5
  changed_when: false

- name: Get K3s node token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw

- name: Set K3s token fact
  set_fact:
    k3s_token: "{{ k3s_token_raw.content | b64decode | trim }}"

- name: Get kubeconfig
  slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: kubeconfig_raw

- name: Save kubeconfig locally
  delegate_to: localhost
  become: false
  copy:
    content: "{{ kubeconfig_raw.content | b64decode | regex_replace('127.0.0.1', ansible_host) }}"
    dest: "{{ playbook_dir }}/../kubeconfig"
    mode: '0600'

- name: Ensure K3s service is enabled and running
  systemd:
    name: k3s
    enabled: yes
    state: started
