# ShieldOps Ansible Variables
---
# K3s Configuration
k3s_version: "v1.29.0+k3s1"
k3s_cluster_cidr: "10.42.0.0/16"
k3s_service_cidr: "10.43.0.0/16"

# Disable components we don't need (saves RAM)
k3s_disable:
  - traefik      # We'll install our own ingress
  - servicelb    # Not needed for our setup

# Node labels
k3s_node_labels:
  environment: production
  project: shieldops

# System packages to install
common_packages:
  - curl
  - wget
  - jq
  - htop
  - net-tools

# Firewall ports
firewall_ports:
  # SSH
  - { port: 22, proto: tcp }
  # K3s API
  - { port: 6443, proto: tcp }
  # Kubelet
  - { port: 10250, proto: tcp }
  # NodePort range
  - { port: "30000:32767", proto: tcp }
  # Flannel VXLAN
  - { port: 8472, proto: udp }

# Timezone
system_timezone: "Europe/Berlin"
