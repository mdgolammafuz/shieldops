<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldOps | Live Threat Radar</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: monospace; margin: 0; padding: 30px; }
        h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .status-badge { padding: 5px 12px; border-radius: 4px; font-weight: bold; }
        .live { background-color: #238636; color: white; }
        .error { background-color: #da3633; color: white; }
        
        /* Telemetry Dials */
        .telemetry-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .telemetry-card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 6px; flex: 1; text-align: center; }
        .telemetry-title { color: #8b949e; font-size: 14px; text-transform: uppercase; margin-bottom: 10px; }
        .telemetry-value { color: #58a6ff; font-size: 32px; font-weight: bold; }
        .telemetry-unit { color: #8b949e; font-size: 16px; }

        table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 6px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #30363d; }
        th { background: #21262d; color: #8b949e; text-transform: uppercase; font-size: 12px; }
        .high { color: #ff7b72; font-weight: bold; }
        .medium { color: #d2a8ff; }
        .low { color: #79c0ff; }
        .keyword { color: #58a6ff; font-weight: bold; }
    </style>
</head>
<body>
    <h1>ShieldOps Threat Intelligence</h1>
    <div class="status-bar">
        <span id="connection-status" class="status-badge live">SYSTEM: ONLINE</span>
        <span style="color: #8b949e;">Auto-refresh: 3s</span>
    </div>

    <div class="telemetry-grid">
        <div class="telemetry-card">
            <div class="telemetry-title">Firehose Ingestion</div>
            <div id="metric-ingestion" class="telemetry-value">--</div>
            <div class="telemetry-unit">certs / sec</div>
        </div>
        <div class="telemetry-card">
            <div class="telemetry-title">Processing Latency</div>
            <div id="metric-latency" class="telemetry-value">--</div>
            <div class="telemetry-unit">seconds</div>
        </div>
        <div class="telemetry-card">
            <div class="telemetry-title">NATS Buffer Depth</div>
            <div id="metric-buffer" class="telemetry-value">--</div>
            <div class="telemetry-unit">pending msgs</div>
        </div>
    </div>
    
    <table>
        <thead>
            <tr>
                <th>Detection Time (UTC)</th>
                <th>Target Brand</th>
                <th>Malicious Domain</th>
                <th>Entropy</th>
                <th>Latency (s)</th>
                <th>Confidence</th>
            </tr>
        </thead>
        <tbody id="threat-body">
            <tr><td colspan="6" style="text-align: center; color: #8b949e;">Initializing secure connection...</td></tr>
        </tbody>
    </table>

    <script>
        async function fetchDashboard() {
            try {
                const response = await fetch('/api/data');
                if (!response.ok) throw new Error('Backend disconnected');
                
                const data = await response.json();
                
                // Update Telemetry
                document.getElementById('metric-ingestion').innerText = data.telemetry.ingestion_rate;
                document.getElementById('metric-latency').innerText = data.telemetry.avg_latency;
                document.getElementById('metric-buffer').innerText = data.telemetry.buffer_depth;

                // Update Table
                const tbody = document.getElementById('threat-body');
                tbody.innerHTML = '';
                
                data.threats.forEach(threat => {
                    const row = document.createElement('tr');
                    const date = new Date(threat.created_at).toISOString().split('.')[0].replace('T', ' ');
                    const confClass = threat.confidence ? threat.confidence.toLowerCase() : 'low';
                    
                    row.innerHTML = `
                        <td>${date}</td>
                        <td class="keyword">${threat.matched_keyword}</td>
                        <td>${threat.domain}</td>
                        <td>${parseFloat(threat.entropy).toFixed(3)}</td>
                        <td>${threat.latency}</td>
                        <td class="${confClass}">${threat.confidence.toUpperCase()}</td>
                    `;
                    tbody.appendChild(row);
                });
                
                document.getElementById('connection-status').className = 'status-badge live';
                document.getElementById('connection-status').innerText = 'SYSTEM: ONLINE';
            } catch (error) {
                document.getElementById('connection-status').className = 'status-badge error';
                document.getElementById('connection-status').innerText = 'SYSTEM: BACKEND UNREACHABLE';
            }
        }

        fetchDashboard();
        setInterval(fetchDashboard, 3000);
    </script>
</body>
</html>
