name: ShieldOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  PROJECT_ID: shieldops-2026-xyz
  REGION: europe-west3
  CLUSTER_NAME: shieldops-cluster
  GAR_LOCATION: europe-west3-docker.pkg.dev/shieldops-2026-xyz/shieldops-repo

jobs:
  static-analysis:
    name: Code & Configuration Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Lint Kubernetes YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: kubernetes/
          config_data: |
            extends: relaxed
            rules:
              line-length: disable

      - name: Lint Dockerfiles (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          ignore: DL3018,DL3008 # Ignore specific apk/apt pinning for this project

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint Python (Flake8)
        run: |
          pip install flake8
          flake8 src/api/ src/processor/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint Go (golangci-lint)
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: src/ingestor

  security-scan:
    name: IaC Security Scanning
    needs: static-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in IaC mode (Dockerized)
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace \
            aquasec/trivy:latest config /workspace \
            --format sarif \
            --output /workspace/trivy-results.sarif \
            --severity CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  integration-testing:
    name: Ephemeral Integration Tests
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup KinD (Kubernetes IN Docker)
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: shieldops-ci

      - name: Build Local Images
        run: |
          docker build -t shieldops-ingestor:latest src/ingestor/
          docker build -t shieldops-processor:latest src/processor/
          docker build -t shieldops-api:latest src/api/

      - name: Load Images into KinD
        run: |
          kind load docker-image shieldops-ingestor:latest shieldops-processor:latest shieldops-api:latest --name shieldops-ci

      - name: Deploy to Ephemeral Cluster
        run: |
          kubectl create namespace shieldops
          # Dynamically generate ephemeral testing secrets to bypass static code scanners
          DB_PASS=$(openssl rand -hex 16)
          GF_PASS=$(openssl rand -hex 16)
          # Construct the full database URL for the app layer
          DB_URL="postgres://shieldops:${DB_PASS}@postgres:5432/shieldops"
          kubectl create secret generic postgres-secret --namespace shieldops --from-literal=username=shieldops --from-literal=password=$DB_PASS --from-literal=database-url=$DB_URL
          kubectl create secret generic grafana-secret --namespace shieldops --from-literal=admin-password=$GF_PASS
          # Override image pull policies and URLs for local testing
          find kubernetes/apps -name "*.yaml" -exec sed -i 's/imagePullPolicy: Always/imagePullPolicy: IfNotPresent/g' {} +
          find kubernetes/apps -name "*.yaml" -exec sed -i 's|europe-west3-docker.pkg.dev/shieldops-2026-xyz/shieldops-repo/||g' {} +
          kubectl apply -R -f kubernetes/
      - name: Wait for Infrastructure to Stabilize
        run: |
          echo "Waiting for core services..."
          kubectl rollout status statefulset/postgres -n shieldops --timeout=120s
          kubectl rollout status deployment/nats -n shieldops --timeout=120s
          echo "Waiting for application layer..."
          kubectl rollout status deployment/ingestor -n shieldops --timeout=120s
          kubectl rollout status deployment/processor -n shieldops --timeout=120s
          kubectl rollout status deployment/api -n shieldops --timeout=120s

      - name: Debug Kubernetes State on Failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n shieldops
          echo "=== Postgres Events ==="
          kubectl describe pod -l app=postgres -n shieldops
          echo "=== Postgres Logs ==="
          kubectl logs -l app=postgres -n shieldops || true
          kubectl describe pod -l app=processor -n shieldops
          echo "=== API Events ==="
          kubectl describe pod -l app=api -n shieldops

      - name: Execute SRE Verification Scripts
        run: |
          chmod +x tests/*.sh
          ./tests/verify_infrastructure.sh
          ./tests/verify_application_layer.sh
          ./tests/verify_observibility_security.sh

  deploy-production:
    name: Deploy to Google Cloud (GKE)
    needs: integration-testing
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Docker Auth to Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Production Images
        run: |
          docker buildx build --platform linux/amd64 -t ${{ env.GAR_LOCATION }}/shieldops-ingestor:latest --push src/ingestor/
          docker buildx build --platform linux/amd64 -t ${{ env.GAR_LOCATION }}/shieldops-processor:latest --push src/processor/
          docker buildx build --platform linux/amd64 -t ${{ env.GAR_LOCATION }}/shieldops-api:latest --push src/api/

      - name: Deploy to Production
        env:
          GRAFANA_PASS: ${{ secrets.GRAFANA_PASSWORD }}
        run: |
          kubectl create secret generic grafana-secret --namespace shieldops --from-literal=admin-password="$GRAFANA_PASS" --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -R -f kubernetes/
          kubectl rollout status deployment/ingestor -n shieldops
          kubectl rollout status deployment/processor -n shieldops
          kubectl rollout status deployment/api -n shieldops